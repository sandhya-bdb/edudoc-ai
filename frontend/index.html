<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduDoc AI - Educational Document Classifier</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
      color: #e2e8f0;
      min-height: 100vh;
      padding: 3rem 2rem;
    }

    header {
      max-width: 900px;
      margin: 0 auto 3rem;
      text-align: center;
    }

    header h1 {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #a78bfa, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1.1rem;
      color: #94a3b8;
    }

    .card {
      background: rgba(30, 41, 59, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
      padding: 2rem;
      max-width: 900px;
      margin: 0 auto 2rem;
    }

    /* ── Drop Zone ── */
    #drop-zone {
      border: 2px dashed rgba(167, 139, 250, 0.4);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
      background: rgba(139, 92, 246, 0.05);
    }

    #drop-zone:hover, #drop-zone.drag-over {
      background: rgba(139, 92, 246, 0.1);
      border-color: rgba(167, 139, 250, 0.8);
      transform: translateY(-2px);
    }

    #drop-zone svg { color: #a78bfa; margin-bottom: 1rem; transition: transform 0.3s ease; }
    #drop-zone:hover svg { transform: scale(1.1); }

    #drop-zone p { font-size: 1.1rem; color: #e2e8f0; font-weight: 500; margin-bottom: 0.5rem; }
    #drop-zone span { font-size: 0.9rem; color: #94a3b8; }

    #file-input { display: none; }

    /* ── Preview Grid ── */
    #preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .preview-item {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.05);
      transition: transform 0.2s ease;
    }
    
    .preview-item:hover {
      transform: scale(1.02);
    }

    .preview-item img {
      width: 100%;
      height: 100px;
      object-fit: cover;
      display: block;
      opacity: 0.9;
    }

    .preview-item .preview-name {
      font-size: 0.75rem;
      padding: 0.4rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #cbd5e1;
      text-align: center;
    }

    .preview-item .remove-btn {
      position: absolute;
      top: 6px; right: 6px;
      background: rgba(0,0,0,0.6);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 24px; height: 24px;
      font-size: 12px;
      cursor: pointer;
      line-height: 24px;
      text-align: center;
      transition: background 0.2s;
    }
    
    .preview-item .remove-btn:hover { background: rgba(220, 38, 38, 0.8); }

    /* ── Actions ── */
    .actions {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      align-items: center;
    }

    #classify-btn {
      background: linear-gradient(135deg, #8b5cf6 0%, #6366f1 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.8rem 1.6rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 14px rgba(99, 102, 241, 0.3);
    }

    #classify-btn:hover:not(:disabled) { 
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
    }
    #classify-btn:disabled { 
      background: #475569; 
      box-shadow: none;
      cursor: not-allowed; 
      transform: none;
      color: #94a3b8;
    }

    #clear-btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.8rem 1.4rem;
      font-size: 0.95rem;
      color: #cbd5e1;
      cursor: pointer;
      transition: all 0.2s;
    }

    #clear-btn:hover { background: rgba(255, 255, 255, 0.1); }

    /* ── Spinner ── */
    .spinner {
      display: inline-block;
      width: 18px; height: 18px;
      border: 3px solid rgba(255,255,255,.2);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: .5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Results Table ── */
    #results-section { display: none; }

    #results-section h2 {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.25rem;
      color: #f8fafc;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      padding-bottom: 0.75rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    thead th {
      text-align: left;
      padding: 0.8rem;
      background: rgba(15, 23, 42, 0.4);
      color: #94a3b8;
      font-weight: 600;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    tbody tr { border-bottom: 1px solid rgba(255,255,255,0.05); transition: background 0.2s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(255,255,255,0.02); }

    td { padding: 0.8rem; vertical-align: middle; }

    .filename-cell {
      max-width: 220px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-family: 'Inter', monospace;
      font-size: 0.9rem;
      color: #e2e8f0;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 9999px;
      font-size: 0.8rem;
      font-weight: 600;
      white-space: nowrap;
      letter-spacing: 0.02em;
    }

    .badge-transcript  { background: rgba(59, 130, 246, 0.2); color: #93c5fd; border: 1px solid rgba(59, 130, 246, 0.3); }
    .badge-certificate { background: rgba(16, 185, 129, 0.2); color: #6ee7b7; border: 1px solid rgba(16, 185, 129, 0.3); }
    .badge-education   { background: rgba(245, 158, 11, 0.2); color: #fcd34d; border: 1px solid rgba(245, 158, 11, 0.3); }
    .badge-image       { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.3); }
    .badge-rules       { background: rgba(236, 72, 153, 0.2); color: #f9a8d4; border: 1px solid rgba(236, 72, 153, 0.3); }
    .badge-ocr         { background: rgba(239, 68, 68, 0.2);  color: #fca5a5; border: 1px solid rgba(239, 68, 68, 0.3); }
    .badge-llm         { background: rgba(14, 165, 233, 0.2); color: #7dd3fc; border: 1px solid rgba(14, 165, 233, 0.3); }
    .badge-unknown     { background: rgba(100, 116, 139, 0.2); color: #cbd5e1; border: 1px solid rgba(100, 116, 139, 0.3); }

    /* ── Progress Bar ── */
    #progress-wrap {
      display: none;
      margin-top: 1.5rem;
    }

    #progress-label {
      font-size: 0.9rem;
      color: #cbd5e1;
      margin-bottom: 0.5rem;
      display: flex;
      justify-content: space-between;
    }

    #progress-track {
      background: rgba(15, 23, 42, 0.6);
      border-radius: 9999px;
      height: 8px;
      overflow: hidden;
    }

    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #8b5cf6, #6366f1);
      border-radius: 9999px;
      width: 0%;
      transition: width 0.4s ease;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }

    /* ── Row states ── */
    tr.pending td { color: #64748b; font-style: italic; }
    tr.waiting td { background: rgba(15, 23, 42, 0.2); color: #64748b; font-style: italic; }
    tr.processing td { background: rgba(139, 92, 246, 0.05); }
    tr.done td { animation: fadeIn 0.5s ease; }
    tr.failed td { background: rgba(239, 68, 68, 0.1); color: #fca5a5; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    /* ── Error Banner ── */
    #error-banner {
      display: none;
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.3);
      border-radius: 8px;
      padding: 1rem;
      color: #fca5a5;
      font-size: 0.95rem;
      margin-top: 1.25rem;
    }

    /* ── Summary Bar ── */
    #summary-bar {
      display: flex;
      gap: 1.5rem;
      font-size: 0.9rem;
      color: #cbd5e1;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      background: rgba(15, 23, 42, 0.4);
      padding: 1rem;
      border-radius: 8px;
    }

    #summary-bar strong { color: #f8fafc; }
  </style>
</head>
<body>

<header>
  <h1>EduDoc AI</h1>
  <p>Automated Classification for Educational Documents</p>
</header>

<!-- Upload Card -->
<div class="card">
  <div id="drop-zone" role="button" tabindex="0" aria-label="Drop images here or click to browse">
    <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round"
        d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
    </svg>
    <p>Drag & drop educational records here</p>
    <span>Transcripts, Certificates, IDs — PNG, JPEG, WebP</span>
  </div>

  <input type="file" id="file-input" multiple accept="image/png,image/jpeg,image/webp" />

  <div id="preview-grid"></div>

  <div id="error-banner"></div>

  <div class="actions">
    <button id="classify-btn" disabled>Process Documents</button>
    <button id="clear-btn">Clear</button>
    <span id="file-count" style="font-size:.9rem;color:#94a3b8;margin-left:auto;"></span>
  </div>

  <div id="progress-wrap">
    <div id="progress-label">
      <span id="progress-text">Processing…</span>
      <span id="progress-fraction"></span>
    </div>
    <div id="progress-track"><div id="progress-fill"></div></div>
  </div>
</div>

<!-- Results Card -->
<div class="card" id="results-section">
  <h2>Classification Results</h2>
  <div id="summary-bar"></div>
  <table>
    <thead>
      <tr>
        <th>Filename</th>
        <th>Type</th>
        <th>Sub-type</th>
        <th>Method</th>
      </tr>
    </thead>
    <tbody id="results-body"></tbody>
  </table>
</div>

<script>
  const API_BASE = "http://127.0.0.1:8000";

  const dropZone       = document.getElementById("drop-zone");
  const fileInput      = document.getElementById("file-input");
  const previewGrid    = document.getElementById("preview-grid");
  const classifyBtn    = document.getElementById("classify-btn");
  const clearBtn       = document.getElementById("clear-btn");
  const fileCount      = document.getElementById("file-count");
  const resultsSection = document.getElementById("results-section");
  const resultsBody    = document.getElementById("results-body");
  const errorBanner    = document.getElementById("error-banner");
  const summaryBar     = document.getElementById("summary-bar");
  const progressWrap   = document.getElementById("progress-wrap");
  const progressFill   = document.getElementById("progress-fill");
  const progressText   = document.getElementById("progress-text");
  const progressFrac   = document.getElementById("progress-fraction");

  const PROCESSING_WINDOW = 5;   // matches backend CLASSIFY_CONCURRENCY
  let selectedFiles = [];   // File[]
  const counts = { transcript: 0, certificate: 0, education: 0, image: 0 };
  let totalMs = 0;
  let rowMap = {};          // filename → <tr>

  // ── Drag & Drop ───────────────────────────────────────────────────────────

  dropZone.addEventListener("dragover", e => {
    e.preventDefault();
    dropZone.classList.add("drag-over");
  });

  dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));

  dropZone.addEventListener("drop", e => {
    e.preventDefault();
    dropZone.classList.remove("drag-over");
    addFiles([...e.dataTransfer.files]);
  });

  dropZone.addEventListener("click", () => fileInput.click());
  dropZone.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") fileInput.click(); });

  fileInput.addEventListener("change", () => {
    addFiles([...fileInput.files]);
    fileInput.value = "";
  });

  // ── File Management ───────────────────────────────────────────────────────

  const ALLOWED = ["image/png", "image/jpeg", "image/webp"];

  function addFiles(files) {
    const valid    = files.filter(f => ALLOWED.includes(f.type));
    const rejected = files.filter(f => !ALLOWED.includes(f.type));

    if (rejected.length) {
      showError(`Skipped ${rejected.length} unsupported file(s): ${rejected.map(f => f.name).join(", ")}`);
    } else {
      hideError();
    }

    const existing = new Set(selectedFiles.map(f => f.name));
    valid.filter(f => !existing.has(f.name)).forEach(f => selectedFiles.push(f));

    renderPreviews();
    updateUI();
  }

  function removeFile(name) {
    selectedFiles = selectedFiles.filter(f => f.name !== name);
    renderPreviews();
    updateUI();
  }

  function renderPreviews() {
    previewGrid.innerHTML = "";
    selectedFiles.forEach(file => {
      const url  = URL.createObjectURL(file);
      const item = document.createElement("div");
      item.className = "preview-item";
      item.innerHTML = `
        <img src="${url}" alt="${file.name}" onload="URL.revokeObjectURL(this.src)" />
        <div class="preview-name" title="${file.name}">${file.name}</div>
        <button class="remove-btn" aria-label="Remove ${file.name}">✕</button>
      `;
      item.querySelector(".remove-btn").addEventListener("click", () => removeFile(file.name));
      previewGrid.appendChild(item);
    });
  }

  function updateUI() {
    const n = selectedFiles.length;
    classifyBtn.disabled = n === 0;
    fileCount.textContent = n ? `${n} file${n > 1 ? "s" : ""} selected` : "";
  }

  // ── Classify — sequential, one file at a time ─────────────────────────────

  classifyBtn.addEventListener("click", async () => {
    if (!selectedFiles.length) return;

    hideError();
    classifyBtn.disabled = true;
    classifyBtn.innerHTML = `<span class="spinner"></span> Processing…`;
    clearBtn.disabled = true;
    setPreviewInteractive(false);

    // Reset counters
    Object.keys(counts).forEach(k => counts[k] = 0);
    totalMs = 0;
    rowMap  = {};

    // Show results table immediately with pending rows
    resultsBody.innerHTML = "";
    summaryBar.innerHTML  = "";
    resultsSection.style.display = "block";
    resultsSection.scrollIntoView({ behavior: "smooth", block: "start" });

    selectedFiles.forEach(f => {
      const tr = document.createElement("tr");
      tr.className = "pending";
      tr.id = `row-${CSS.escape(f.name)}`;
      tr.innerHTML = `
        <td class="filename-cell" title="${f.name}">${f.name}</td>
        <td colspan="3" style="color:#64748b;font-size:.85rem;">queued…</td>
      `;
      resultsBody.appendChild(tr);
      rowMap[f.name] = tr;
    });

    // Show progress bar
    const total = selectedFiles.length;
    let done = 0;
    setProgress(0, total);
    progressText.textContent = `Sending ${total} file${total > 1 ? "s" : ""} for classification…`;

    selectedFiles.forEach((f, i) => {
      const tr = rowMap[f.name];
      if (i < PROCESSING_WINDOW) {
        tr.className = "processing";
        tr.innerHTML = `
          <td class="filename-cell" title="${f.name}">${f.name}</td>
          <td colspan="3">
            <span class="spinner" style="border-color:rgba(139,92,246,0.3);border-top-color:#8b5cf6;"></span>
            <span style="font-size:.85rem;color:#a78bfa;">processing…</span>
          </td>
        `;
      } else {
        tr.className = "waiting";
        tr.innerHTML = `
          <td class="filename-cell" title="${f.name}">${f.name}</td>
          <td colspan="3" style="font-size:.85rem;">waiting…</td>
        `;
      }
    });

    const form = new FormData();
    selectedFiles.forEach(f => form.append("files", f));

    try {
      const resp = await fetch(`${API_BASE}/classify`, { method: "POST", body: form });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: resp.statusText }));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }

      const handleResult = (r) => {
        const tr = rowMap[r.filename];
        if (tr) {
          fillRow(tr, r);
          counts[r.doc_type] = (counts[r.doc_type] || 0) + 1;
          totalMs += r.latency_ms || 0;
        }
        const nextWaiting = resultsBody.querySelector("tr.waiting");
        if (nextWaiting) {
          const name = nextWaiting.querySelector(".filename-cell").getAttribute("title");
          nextWaiting.className = "processing";
          nextWaiting.innerHTML = `
            <td class="filename-cell" title="${name}">${name}</td>
            <td colspan="3">
              <span class="spinner" style="border-color:rgba(139,92,246,0.3);border-top-color:#8b5cf6;"></span>
              <span style="font-size:.85rem;color:#a78bfa;">processing…</span>
            </td>
          `;
        }
        done++;
        setProgress(done, total);
        updateSummary(done, total);
      };

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = "";
      while (true) {
        const { value, done: streamDone } = await reader.read();
        if (streamDone) break;
        buf += decoder.decode(value, { stream: true });
        let nl;
        while ((nl = buf.indexOf("\n")) >= 0) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
          if (line) handleResult(JSON.parse(line));
        }
      }
      if (buf.trim()) handleResult(JSON.parse(buf));

    } catch (err) {
      selectedFiles.forEach(f => {
        const tr = rowMap[f.name];
        if (tr && (tr.className === "pending" || tr.className === "processing" || tr.className === "waiting")) {
          tr.className = "failed";
          tr.innerHTML = `
            <td class="filename-cell" title="${f.name}">${f.name}</td>
            <td colspan="3" style="color:#fca5a5;font-size:.85rem;">Error: ${err.message}</td>
          `;
        }
      });
      showError(`Classification failed: ${err.message}`);
    }

    // Done
    classifyBtn.disabled = false;
    classifyBtn.innerHTML = "Process Documents";
    clearBtn.disabled = false;
    setPreviewInteractive(true);
    progressText.textContent = `Done — ${total} file${total > 1 ? "s" : ""} classified`;
  });

  // ── Row fill ─────────────────────────────────────────────────────────────

  function fillRow(tr, r) {
    tr.className = "done";
    tr.innerHTML = `
      <td class="filename-cell" title="${r.filename}">${r.filename}</td>
      <td><span class="badge badge-${r.doc_type}">${r.doc_type}</span></td>
      <td>${r.sub_type ? `<span class="badge badge-unknown">${r.sub_type}</span>` : "—"}</td>
      <td><span class="badge badge-${r.method}">${r.method}</span></td>
    `;
  }

  // ── Progress ──────────────────────────────────────────────────────────────

  function setProgress(done, total) {
    const pct = total ? Math.round((done / total) * 100) : 0;
    progressWrap.style.display  = "block";
    progressFill.style.width    = `${pct}%`;
    progressFrac.textContent    = `${done} / ${total}`;
    if (done < total) {
      progressText.textContent  = `Processing file ${done + 1} of ${total}…`;
    }
  }

  function updateSummary(done, total) {
    const avg = done ? Math.round(totalMs / done) : 0;
    summaryBar.innerHTML = `
      <span>Processed: <strong>${done} / ${total}</strong></span>
      ${counts.transcript  ? `<span>Transcripts: <strong>${counts.transcript}</strong></span>`  : ""}
      ${counts.certificate ? `<span>Certificates: <strong>${counts.certificate}</strong></span>` : ""}
      ${counts.education   ? `<span>Edu Docs: <strong>${counts.education}</strong></span>`     : ""}
      ${counts.image       ? `<span>Images (LLM): <strong>${counts.image}</strong></span>`       : ""}
      <span>Avg latency: <strong>${avg} ms</strong></span>
    `;
  }

  // ── Clear ─────────────────────────────────────────────────────────────────

  clearBtn.addEventListener("click", () => {
    selectedFiles = [];
    previewGrid.innerHTML            = "";
    resultsSection.style.display     = "none";
    resultsBody.innerHTML            = "";
    summaryBar.innerHTML             = "";
    progressWrap.style.display       = "none";
    progressFill.style.width         = "0%";
    hideError();
    updateUI();
  });

  // ── Helpers ───────────────────────────────────────────────────────────────

  function setPreviewInteractive(enabled) {
    dropZone.style.pointerEvents = enabled ? "" : "none";
    dropZone.style.opacity       = enabled ? "" : "0.5";
    document.querySelectorAll(".remove-btn").forEach(btn => {
      btn.disabled = !enabled;
      btn.style.opacity = enabled ? "" : "0.3";
      btn.style.cursor  = enabled ? "" : "not-allowed";
    });
  }

  function showError(msg) {
    errorBanner.textContent    = msg;
    errorBanner.style.display  = "block";
  }

  function hideError() {
    errorBanner.style.display  = "none";
    errorBanner.textContent    = "";
  }
</script>

</body>
</html>
