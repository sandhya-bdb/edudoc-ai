name: Deploy to Azure Container Apps

on:
  push:
    branches: [main]
  workflow_dispatch:      # allow manual trigger from GitHub UI

env:
  RESOURCE_GROUP: medishield-rg
  ACR_NAME: medishieldacr
  CONTAINER_APP_NAME: medishield-classifier
  IMAGE_TAG: ${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run python -m pytest tests/ -q --tb=short
        env:
          GOOGLE_API_KEY: dummy-key-for-tests
          LANGCHAIN_TRACING_V2: "false"

  deploy:
    needs: test          # only deploy if tests pass
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ── Azure login via OIDC (no long-lived secrets) ──────────────────────
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Build & push image to ACR ─────────────────────────────────────────
      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry ${{ env.ACR_NAME }} \
            --image classifier:${{ env.IMAGE_TAG }} \
            --image classifier:latest \
            .

      # ── Rolling deploy to Container Apps ──────────────────────────────────
      - name: Deploy to Container Apps
        run: |
          # Build secrets list
          SECRETS="google-api-key=${{ secrets.GOOGLE_API_KEY }}"
          if [ -n "${{ secrets.LANGCHAIN_API_KEY }}" ]; then
            SECRETS="$SECRETS,langchain-api-key=${{ secrets.LANGCHAIN_API_KEY }}"
          fi

          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_NAME }}.azurecr.io/classifier:${{ env.IMAGE_TAG }} \
            --secrets "$SECRETS"

      # ── Smoke test the live endpoint ──────────────────────────────────────
      - name: Smoke test health endpoint
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)

          echo "Testing https://$APP_URL/health"
          curl --fail --retry 5 --retry-delay 10 "https://$APP_URL/health"
          echo "✅ Smoke test passed"

      - name: Print app URL
        run: |
          APP_URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query "properties.configuration.ingress.fqdn" -o tsv)
          echo "🚀 Deployed: https://$APP_URL"
